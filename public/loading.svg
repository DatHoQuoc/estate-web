<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 20" width="140" height="20">
    <defs>
        <style>
            @keyframes blink {
                0%, 20% { opacity: 1; }
                40%, 100% { opacity: 0.1; }
            }
            .square1 { animation: blink 0.6s infinite; }
            .square2 { animation: blink 0.6s infinite 0.15s; }
            .square3 { animation: blink 0.6s infinite 0.3s; }
            .square4 { animation: blink 0.6s infinite 0.45s; }

            rect {
                opacity: 0.1;
            }
        </style>
    </defs>
    
    <rect class="square1" x="0" y="0" width="20" height="20" fill="#000000" />
    <rect class="square2" x="40" y="0" width="20" height="20" fill="#000000" />
    <rect class="square3" x="80" y="0" width="20" height="20" fill="#000000" />
    <rect class="square4" x="120" y="0" width="20" height="20" fill="#000000" />
</svg>